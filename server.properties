# ---------------------------------------------------------------
#  TOMCAT C2 Framework - Server Configuration
#  AUTHOR : MatrixTM26
#  GITHUB : https://github.com/MatrixTM26
# ---------------------------------------------------------------

# ---------------------------------------------------------------
# Server
# ---------------------------------------------------------------
server.host=0.0.0.0
server.port=4444

# Listener mode:
# multi    - accept all non-TLS (raw shell, TOMCAT agent, HTTP beacon)
# http     - HTTP beacon only
# https    - HTTPS beacon only (TLS, no client cert)
# tls      - TOMCAT agent over TLS (no client cert)
# mtls     - TOMCAT agent over mTLS (client cert required)
# fmtls    - full mTLS TCP + HTTPS beacon
# raw      - raw TCP reverse shell only
server.mode=multi

# ---------------------------------------------------------------
# Web Panel
# ---------------------------------------------------------------
web.host=0.0.0.0
web.port=9926
web.template.dir=config/app/templates
web.static.dir=config/app/static

# HTTP/HTTPS beacon port (-1 to disable)
web.beacon.port=-1

# ---------------------------------------------------------------
# TeamServer
# ---------------------------------------------------------------
# API port for multi-operator mode
# Run with: java -jar tomcat-c2.jar --teamserver
teamserver.port=5001

# ---------------------------------------------------------------
# TLS - Certificate Keystore
# ---------------------------------------------------------------
# Supported types: PKCS12 | JKS | PEM | CRT | AUTO
# AUTO detects by extension: .p12/.pfx=PKCS12, .jks=JKS, .pem=PEM, .crt=CRT
cert.keystore.path=certs/server.p12
cert.keystore.type=AUTO
cert.keystore.password=tomcat-c2

cert.truststore.path=certs/truststore.p12
cert.truststore.type=AUTO
cert.truststore.password=tomcat-c2

cert.ca.path=certs/ca.p12
cert.ca.type=AUTO
cert.ca.password=tomcat-c2

# Agent cert output directory
cert.agent.dir=certs/agents

# ---------------------------------------------------------------
# Certificate Subject DN - Server
# ---------------------------------------------------------------
cert.dn.cn=TOMCAT C2 Server
cert.dn.o=TOMCAT C2 Frameworks
cert.dn.ou=ManInTheMatrix
cert.dn.l=DarkNet
cert.dn.st=Cybertron
cert.dn.c=US

# ---------------------------------------------------------------
# Certificate Subject DN - CA
# ---------------------------------------------------------------
cert.ca.dn.cn=TOMCAT C2 Root CA
cert.ca.dn.o=TOMCAT C2 Frameworks
cert.ca.dn.ou=ManInTheMatrix
cert.ca.dn.l=DarkNet
cert.ca.dn.st=Cybertron
cert.ca.dn.c=US

# ---------------------------------------------------------------
# Certificate Validity
# ---------------------------------------------------------------
cert.server.validity.days=365
cert.agent.validity.days=90
cert.ca.validity.days=3650
cert.tls.protocol=TLSv1.3

# ---------------------------------------------------------------
# Agent
# ---------------------------------------------------------------
agent.connection.timeout=10000
agent.command.timeout=30000
agent.max.connections=100
agent.buffer.size=8192

# ---------------------------------------------------------------
# Logging
# ---------------------------------------------------------------
# Level: INFO | DEBUG | VERBOSE | WARN | ERROR
logging.level=DEBUG
logging.verbose=true
logging.max.entries=1000
logging.file=logs/tomcat-c2.log
logging.file.enabled=false

# ---------------------------------------------------------------
# Interface
# ---------------------------------------------------------------
# Interface: web | cli | gui | teamserver
mode.interface=cli

# ---------------------------------------------------------------
# Database (TeamServer)
# ---------------------------------------------------------------
# Type: none | postgresql | mongodb
db.type=mongodb

# PostgreSQL: jdbc:postgresql://host:5432/dbname
# MongoDB:    mongodb://host:27017
db.url=jdbc:postgresql://localhost:5432/tomcat_c2
db.name=tomcat_c2
db.user=tomcat
db.password=tomcat
