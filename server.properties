# ============================================================
#  TOMCAT C2 Framework — Server Configuration
#  AUTHOR : MatrixTM26
#  GITHUB : https://github.com/MatrixTM26
# ============================================================

# ── Server ───────────────────────────────────────────────────
server.host=0.0.0.0
server.port=4444

# Listener mode: multi | http | https | tls | mtls | fmtls | raw
server.mode=multi

# ── Web Panel ────────────────────────────────────────────────
web.host=0.0.0.0
web.port=9926
web.template.dir=config/app/templates
web.static.dir=config/app/static

# HTTP/HTTPS beacon port (-1 to disable)
web.beacon.port=-1

# ── TLS / mTLS Certificate ───────────────────────────────────
# Supported keystore types: PKCS12 | JKS | PEM | CRT | AUTO
# AUTO = detect by file extension (.p12/.pfx → PKCS12, .jks → JKS, .pem/.crt → PEM)

cert.keystore.path=certs/server.p12
cert.keystore.type=AUTO
cert.keystore.password=tomcat-c2

cert.truststore.path=certs/truststore.p12
cert.truststore.type=AUTO
cert.truststore.password=tomcat-c2

# CA path (used when generating certs, optional if using existing)
cert.ca.path=certs/ca.p12
cert.ca.type=AUTO
cert.ca.password=tomcat-c2

# Agent cert output dir
cert.agent.dir=certs/agents

# ── Certificate Subject (DN) ─────────────────────────────────
cert.dn.cn=TOMCAT C2 Server
cert.dn.o=TOMCAT C2 Frameworks
cert.dn.ou=ManInTheMatrix
cert.dn.l=DarkNet
cert.dn.st=Cybertron
cert.dn.c=US

cert.ca.dn.cn=TOMCAT C2 Root CA
cert.ca.dn.o=TOMCAT C2 Frameworks V2
cert.ca.dn.ou=ManInTheMatrix
cert.ca.dn.l=DarkNet
cert.ca.dn.st=Cybertron
cert.ca.dn.c=US

# Certificate validity (days)
cert.server.validity.days=365
cert.agent.validity.days=90
cert.ca.validity.days=3650

# TLS protocol: TLSv1.3 | TLSv1.2
cert.tls.protocol=TLSv1.3

# ── Agent ────────────────────────────────────────────────────
agent.connection.timeout=10000
agent.command.timeout=120000
agent.max.connections=100
agent.buffer.size=8192

# ── Logging ──────────────────────────────────────────────────
# Level: INFO | DEBUG | VERBOSE | WARN | ERROR
logging.level=INFO
logging.verbose=false
logging.max.entries=1000
logging.file=logs/tomcat-c2.log
logging.file.enabled=false

# ── Interface mode ───────────────────────────────────────────
# Interface: web | cli | gui
mode.interface=web
