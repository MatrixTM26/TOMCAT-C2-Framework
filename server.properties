# TOMCAT C2 Framework - Server Configuration
# AUTHOR : MatrixTM26
# GITHUB : https://github.com/MatrixTM26


# Server Settings
server.host=0.0.0.0
server.port=4444

# Web Panel Settings
web.host=0.0.0.0
web.port=9926
web.template.dir=config/app/templates
web.static.dir=config/app/static

# Security Settings
security.mtls.enabled=false
security.keystore.path=certs/server.p12
security.keystore.password=tomcat-c2
security.keystore.type=PKCS12
security.truststore.path=certs/truststore.p12
security.truststore.password=tomcat-c2
security.tls.protocol=TLSv1.3

# Agent Settings
agent.connection.timeout=10000
agent.command.timeout=120000
agent.max.connections=100
agent.buffer.size=8192

# Logging
logging.level=DEBUG
logging.max.entries=1000
logging.file=logs/tomcat-c2.log

# Mode
mode.meterpreter=false
mode.interface=web
